<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DevTools - 开发者工具集，包含 Token 生成器、Hash 文本、加密解密、UUID 生成器等常用工具">
    <meta name="theme-color" content="#0d1117">
    <title>DevTools - 开发者工具集</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body data-theme="dark">
    <div class="app">
        <header class="mobile-header">
            <button class="hamburger-btn" onclick="toggleSidebar()">☰</button>
            <span class="logo-text">DevTools</span>
            <button class="theme-toggle-btn" onclick="toggleTheme()">🌙</button>
        </header>
        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
        <aside class="sidebar">
            <div class="logo">
                <h1>DevTools</h1>
                <p>开发者工具集</p>
            </div>
            <div class="search-box">
                <input type="text" id="tool-search" placeholder="搜索工具..." oninput="searchTools()" onkeydown="handleSearchKeydown(event)">
                <div class="search-results" id="search-results"></div>
            </div>
            <nav class="nav-menu" id="nav-menu">
                <div class="nav-category">
                    <span class="nav-category-title">生成器</span>
                    <button class="nav-item active" data-tool="token-generator">
                        <span class="icon">🔑</span>
                        <span>Token 生成器</span>
                    </button>
                    <button class="nav-item" data-tool="uuid-generator">
                        <span class="icon">🆔</span>
                        <span>UUID 生成器</span>
                    </button>
                    <button class="nav-item" data-tool="mac-generator">
                        <span class="icon">📡</span>
                        <span>MAC 地址生成器</span>
                    </button>
                    <button class="nav-item" data-tool="random-port">
                        <span class="icon">🔢</span>
                        <span>随机端口生成器</span>
                    </button>
                    <button class="nav-item" data-tool="password-generator">
                        <span class="icon">🔐</span>
                        <span>密码生成器</span>
                    </button>
                    <button class="nav-item" data-tool="rsa-key-generator">
                        <span class="icon">🗝️</span>
                        <span>RSA 密钥对生成器</span>
                    </button>
                </div>
                <div class="nav-category">
                    <span class="nav-category-title">加密与哈希</span>
                    <button class="nav-item" data-tool="hash-text">
                        <span class="icon">#️⃣</span>
                        <span>Hash 文本</span>
                    </button>
                    <button class="nav-item" data-tool="bcrypt-hash">
                        <span class="icon">🔒</span>
                        <span>Bcrypt 哈希</span>
                    </button>
                    <button class="nav-item" data-tool="encrypt-decrypt">
                        <span class="icon">🔏</span>
                        <span>加密/解密</span>
                    </button>
                    <button class="nav-item" data-tool="password-strength">
                        <span class="icon">📊</span>
                        <span>密码强度分析</span>
                    </button>
                </div>
                <div class="nav-category">
                    <span class="nav-category-title">转换器</span>
                    <button class="nav-item" data-tool="qrcode-generator">
                        <span class="icon">📱</span>
                        <span>二维码生成器</span>
                    </button>
                    <button class="nav-item" data-tool="github-mirror">
                        <span class="icon">⚡</span>
                        <span>Github 加速下载</span>
                    </button>
                    <button class="nav-item" data-tool="roman-numeral">
                        <span class="icon">🏛️</span>
                        <span>罗马数字转换器</span>
                    </button>
                    <button class="nav-item" data-tool="docker-converter">
                        <span class="icon">🐳</span>
                        <span>Docker 转换器</span>
                    </button>
                </div>
                <div class="nav-category">
                    <span class="nav-category-title">计算器</span>
                    <button class="nav-item" data-tool="subnet-calculator">
                        <span class="icon">🌐</span>
                        <span>IPv4 子网计算器</span>
                    </button>
                    <button class="nav-item" data-tool="byte-calculator">
                        <span class="icon">💾</span>
                        <span>字节计算器</span>
                    </button>
                </div>
                <div class="nav-category">
                    <span class="nav-category-title">查询工具</span>
                    <button class="nav-item" data-tool="http-codes">
                        <span class="icon">📋</span>
                        <span>HTTP 状态码</span>
                    </button>
                    <button class="nav-item" data-tool="idcard-query">
                        <span class="icon">🆔</span>
                        <span>身份证归属地查询</span>
                    </button>
                    <button class="nav-item" data-tool="phone-query">
                        <span class="icon">📞</span>
                        <span>手机归属地查询</span>
                    </button>
                    <button class="nav-item" data-tool="bankcard-query">
                        <span class="icon">💳</span>
                        <span>银行卡归属地查询</span>
                    </button>
                    <button class="nav-item" data-tool="icp-query">
                        <span class="icon">📜</span>
                        <span>ICP 备案查询</span>
                    </button>
                    <button class="nav-item" data-tool="whois-query">
                        <span class="icon">🔍</span>
                        <span>WHOIS 查询</span>
                    </button>
                    <button class="nav-item" data-tool="status-code-check">
                        <span class="icon">📡</span>
                        <span>网站状态码检测</span>
                    </button>
                </div>
                <div class="nav-category">
                    <span class="nav-category-title">网络工具</span>
                    <button class="nav-item" data-tool="ping-tool">
                        <span class="icon">🏓</span>
                        <span>Ping 检测</span>
                    </button>
                    <button class="nav-item" data-tool="wechat-check">
                        <span class="icon">🟢</span>
                        <span>微信域名拦截检测</span>
                    </button>
                </div>
                <div class="nav-category">
                    <span class="nav-category-title">其他工具</span>
                    <button class="nav-item" data-tool="temp-mail">
                        <span class="icon">📧</span>
                        <span>临时邮箱</span>
                    </button>
                    <button class="nav-item" data-tool="translator">
                        <span class="icon">🌐</span>
                        <span>文本翻译</span>
                    </button>
                </div>
                <div class="nav-category">
                    <span class="nav-category-title">设备与代理</span>
                    <button class="nav-item" data-tool="device-info">
                        <span class="icon">💻</span>
                        <span>设备信息</span>
                    </button>
                    <button class="nav-item" data-tool="user-agent">
                        <span class="icon">🌍</span>
                        <span>用户代理分析</span>
                    </button>
                </div>
            </nav>
        </aside>
        <main class="content">
            <div id="tool-container"></div>
        </main>
        <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
    </div>
    <script src="/utils/helpers.js"></script>
    <script src="/tools/token-generator.js"></script>
    <script src="/tools/uuid-generator.js"></script>
    <script src="/tools/mac-generator.js"></script>
    <script src="/tools/random-port.js"></script>
    <script src="/tools/password-generator.js"></script>
    <script src="/tools/rsa-key-generator.js"></script>
    <script src="/tools/hash-text.js"></script>
    <script src="/tools/bcrypt-hash.js"></script>
    <script src="/tools/encrypt-decrypt.js"></script>
    <script src="/tools/password-strength.js"></script>
    <script src="/tools/roman-numeral.js"></script>
    <script src="/tools/docker-converter.js"></script>
    <script src="/tools/subnet-calculator.js"></script>
    <script src="/tools/http-codes.js"></script>
    <script src="/tools/device-info.js"></script>
    <script src="/tools/user-agent.js"></script>
    <script src="/tools/qrcode-generator.js"></script>
    <script src="/tools/github-mirror.js"></script>
    <script src="/tools/byte-calculator.js"></script>
    <script src="/tools/idcard-query.js"></script>
    <script src="/tools/phone-query.js"></script>
    <script src="/tools/bankcard-query.js"></script>
    <script src="/tools/icp-query.js"></script>
    <script src="/tools/temp-mail.js"></script>
    <script src="/tools/whois-query.js"></script>
    <script src="/tools/ping-tool.js"></script>
    <script src="/tools/wechat-check.js"></script>
    <script src="/tools/translator.js"></script>
    <script src="/tools/status-code-check.js"></script>
    <script src="/app.js"></script>
    <div class="footer-info" id="footer-info">
        <div class="footer-yiyan" id="yiyan-text">正在加载...</div>
        <div class="footer-user" id="user-info"></div>
    </div>
    <script>
        (function() {
            // 随机一言
            fetchWithBackupKey('https://cn.apihz.cn/api/yiyan/api.php?id=88888888&key=88888888')
                .then(data => {
                    if (data.code === 200) {
                        document.getElementById('yiyan-text').textContent = data.msg;
                    } else {
                        document.getElementById('yiyan-text').textContent = '';
                    }
                })
                .catch(() => {
                    document.getElementById('yiyan-text').textContent = '';
                });

            // 用户信息
            fetchWithBackupKey('https://cn.apihz.cn/api/ip/getapi.php?id=88888888&key=88888888')
                .then(data => {
                    if (data.code === 200) {
                        document.getElementById('user-info').innerHTML = `IP: ${data.ip || '-'} &middot; 浏览器: ${data.browser || '-'} &middot; 系统: ${data.os || '-'}`;
                    }
                })
                .catch(() => {});
        })();
    </script>
</body>
</html>
